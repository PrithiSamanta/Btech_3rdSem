<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=[1,45,7,36,7,2];
        document.write("The maximum element in array : "+max(a));
        function max(a){
            max=a[0];
            for(i=1;i<a.length;i++){
                if(a[i]>max) max=a[i];
            }
            return max;
        }
    </script>
</body>
</html>
