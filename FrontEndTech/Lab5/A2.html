<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        arrStr = prompt("Enter array comma seperated without spaces");
        arr = arrStr.split(',', arrStr.length);
        for (i = 0; i < arr.length; i++) {
            arr[i] = parseInt(arr[i]);
        }
        arr = selectionSort(arr);

        function selectionSort(arr) {
            for (i = 0; i < arr.length - 1; i++) {
                for (j = i + 1; j < arr.length; j++) {
                    if (arr[j] < arr[i]) {
                        temp = arr[i];
                        arr[i] = arr[j];
                        arr[j] = temp;
                    }
                }
            }
            return arr;
        }
        console.log(arr)
        document.write(arr);
    </script>
</body>

</html>
