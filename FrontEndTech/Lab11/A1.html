<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        class Student {
            constructor(name, age) {
                this.name = name;
                this.age = age;
            }
            showDetails() {
                document.write("Name : "+this.name+ " | Age: "+ this.age);
            }
        }
        s1 = new Student("Prithi", 15);
        s1.showDetails();

    </script>
</body>

</html>
