<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let student = {
            name: 'Prithi',
            age: 20,
            city: 'Rajkot'
        }
        let {name, age,...city} = student;
        document.write("Name: "+name+" | Age: "+age+" | City: "+city.city);

        //swap values using destructuring
        let a=10,b=20;
        [a,b]=[b,a]
        document.write('<br/>a: '+a+" | b: "+b)
    </script>
</body>

</html>
