<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        num = parseInt(prompt("Enter a number : "));
        ans=1
        while(num!=1) {
            ans*=num;
            num--
        }
        document.write("The factorial is"+ans);

    </script>
</body>

</html>
