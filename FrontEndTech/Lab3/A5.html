<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        num = parseInt(prompt("Enter a number : "));
        temp = num;
        rev = 0;
        digit = 0;
        while (num > 0) {
            digit = num % 10;
            rev = rev * 10 + digit;
            num = parseInt(num / 10);
        }
        if (rev == temp) document.write("Palindrome");
        else document.write("Not palindrome");
    </script>
</body>

</html>
