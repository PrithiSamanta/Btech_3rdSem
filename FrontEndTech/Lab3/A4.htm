<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        num = parseInt(prompt("Enter a number :"));
        a = 0;
        b = 1;
        for (i = 1; i <= num; i++) {
            if (i == 1) {
                document.write(a + ',');
            }
            else if (i == 2) {
                document.write(b + ',')
            }
            else {
                document.write((a + b) + ",");
                b = a + b;
                a = b - a;

            }
        }
    </script>
</body>

</html>
