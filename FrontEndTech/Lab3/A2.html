<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num = prompt("Enter a number : ");
        isPrime =1;
        for(i=2;i<=num/2;i++){
            if(num%i==0){
                isPrime =0;
                break;
            }
        }
        if(isPrime==1) document.write("The number is prime.");
        else document.write("The number is not prime.");
    </script>
</body>
</html>
