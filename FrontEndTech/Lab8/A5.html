<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <h1 id="myH1">Old heading</h1>
    <button id="myBtn">Change</button>
    <script>
        myH1 = document.getElementById("myH1");
        document.getElementById("myBtn").addEventListener("click",()=>{
            myH1.style.fontStyle='italic';
            myH1.style.color='blue';
            myH1.style.backgroundColor='whitesmoke';
            myH1.style.textDecoration='underline';
            myH1.style.fontWeight='700';
            myH1.style.fontSize='40px'
        })
    </script>
</body>
</html>
