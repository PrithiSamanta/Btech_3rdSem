<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        distance = parseInt(prompt("Enter distance to building"))
        angle = parseInt(prompt("Enter angle to top of building"))
        document.write("The height of building is : "+(Math.tan(angle*Math.PI/180)*distance))
    </script>
</body>
</html>
