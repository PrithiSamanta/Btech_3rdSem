<!-- Display Floor, Ceiling, Round, and Truncate values of a decimal number -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num = -2.3252;
        console.log("Original number : "+num)
        console.log("Math.floor : "+Math.floor(num))
        console.log("Math.ceil : "+Math.ceil(num))
        console.log("Math.round : "+Math.round(num))
        console.log("Math.trunc : "+Math.trunc(num))
    </script>
</body>
</html>
