<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the number of digit the password should have."));
        password='';
        while(n!=0){
            password+=Math.floor(Math.random()*10);
            n--;
        }
        document.write(password);
    </script>
</body>
</html>
