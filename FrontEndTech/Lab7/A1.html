<!-- Find Maximum, Minimum, and Absolute Value using the Math object. (A) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=-3.5;
        console.log("Maximum : "+Math.max(a))
        console.log("Minimum : "+Math.min(a))
        console.log("Absolute : "+Math.abs(a))
    </script>
</body>
</html>
