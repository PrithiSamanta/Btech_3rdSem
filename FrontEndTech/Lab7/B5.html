<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        by= parseInt(prompt("Enter birth year."))
        d= new Date()
        age = d.getFullYear() - by;
        document.write("Your age is "+age);
    </script>
</body>
</html>
