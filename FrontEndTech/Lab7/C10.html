<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the number of digit the password should have."));
        passwordBank='1234567890qwertyuiopasdfghjklzxcvbnmQWERTYUIOPASDFGHJKLZXCVBNM';
        password='';
        while(n!=0){
            password+=passwordBank.charAt(Math.floor(Math.random()*passwordBank.length));
            n--;
        }
        document.write(password);
    </script>
</body>
</html>
