<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <script>
    function countDown() {
      currentDate = new Date();
      nextYear = new Date(currentDate.getFullYear() + 1, 0, 1);
      timeGap = nextYear.getTime() - currentDate.getTime();
      days = Math.floor(timeGap / (1000 * 60 * 60 * 24));
      hours = Math.floor(timeGap / (1000 * 60 * 60) % 24);
      minutes = Math.floor(timeGap / (1000 * 60) % 60);
      seconds = Math.floor(timeGap / (1000) % 60);
      console.log(`${days}days : ${hours}hours : ${minutes}minutes : ${seconds}seconds`);
    }
    setInterval(countDown, 1000)
  </script>
</body>

</html>
