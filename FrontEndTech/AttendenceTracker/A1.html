<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      footer {
        margin-left: 12px;
      }
    </style>
  </head>
  <body>
    <nav class="d-flex justify-content-center mb-3">
      <h1 class="fw-bold text-decoration-underline">Attendence Tracker</h1>
    </nav>
    <main class="row mx-5 flex-wrap" id="main">
      <form class="row g-3 justify-content-center" onsubmit="prevent(event)">
        <div class="col-auto mt-0">
          <label for="inputPassword2" class="visually-hidden"
            >Attendence Range</label
          >
          <input
            type="text"
            class="form-control"
            placeholder="Enter range"
            id="rangeStr"
          />
          <span class="text-secondary">(Use - as seperator)</span>
          <span id="warning" class="text-danger"></span>
        </div>
        <div class="col-auto mt-0">
          <button
            type="submit"
            class="btn btn-primary mb-3"
            onclick="startAttendence(event)"
          >
            Start Attendence
          </button>
        </div>
      </form>

      <div class="row">
        <div class="col-md-4 col-sm-6">
          <button
            class="visually-hidden btn btn-success"
            id="check"
            onclick="checkAll()"
          >
            Mark all present
          </button>
        </div>
      </div>
    </main>
    <footer id="footer" class="mb-5">
      <button
        class="visually-hidden btn btn-primary mx-5"
        id="submitAtt"
        onclick="subAttendence()"
      >
        Submit Attendence
      </button>
      <div id="attendenceStatus"></div>
    </footer>
    <script>
      function prevent(e) {
        e.preventDefault();
      }
      function startAttendence(e) {
        e.preventDefault();
        let rangeStr = document.getElementById("rangeStr").value;
        if (rangeStr == "") {
          document.getElementById("warning").innerText =
            "The input can't be empty";
          return;
        }

        let range = rangeStr.split("-");
        let start = parseInt(range[0]);
        let end = parseInt(range[1]);

        let main = document.getElementById("main");

        let inst = "";
        for (i = start; i <= end; i++) {
          inst += `
            <div class="col-sm-6 col-md-4 col-lg-3 mb-3 my-2">
              <div class="card">
                <div class="card-body">
                  <h5 class="card-title">Roll No: ${i}</h5>
                  <input class="form-check-input check" type="checkbox" value="" id="checkDefault${i}">
                  <label class="form-check-label" for="checkDefault${i}">
                    Present
                  </label>
                </div>
              </div>
            </div>
          `;
        }
        main.innerHTML += inst;

        document
          .getElementById("submitAtt")
          .classList.remove("visually-hidden");

        document.getElementById("check").classList.remove("visually-hidden");
      }

      function checkAll() {
        const checkBoxes = document.getElementsByClassName("check");
        for (let i = 0; i < checkBoxes.length; i++) {
          checkBoxes[i].checked = true;
        }
      }

      let totalPresent = 0;
      let totalAbsent = 0;

      function subAttendence() {
        totalPresent = 0;
        totalAbsent = 0;

        const checkBoxes = document.getElementsByClassName("check");
        for (let i = 0; i < checkBoxes.length; i++) {
          if (checkBoxes[i].checked) totalPresent++;
          else totalAbsent++;
        }
        let statusBox = document.getElementById("attendenceStatus");
        statusBox.innerHTML = `
        <div class="fw-bold mx-5 my-1">Total present = ${totalPresent}</div>
        <div class="fw-bold mx-5 my-1">Total absent= ${totalAbsent}</div>
        `;
      }
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
