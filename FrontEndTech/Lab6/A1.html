<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        let facultyList = [
            {
                name: "Dr. Gopi Sanghani",
                image: 'https://du-website.s3.ap-south-1.amazonaws.com/U01/Faculty-Photo/5---29-04-2023-11-00-29.jpg',
                experience: 26,
                qualification: 'Ph.D, ME(CE)'
            },
            {
                name: "Dr. Nilesh Gambhava",
                image: 'https://du-website.s3.ap-south-1.amazonaws.com/U01/Faculty-Photo/3---28-04-2023-02-02-42.jpg',
                experience: 23,
                qualification: 'Ph.D, ME(CE)'
            },
            {
                name: "Dr. Pradyumansinh Jadeja    ",
                image: 'https://du-website.s3.ap-south-1.amazonaws.com/U01/Faculty-Photo/6---28-04-2023-02-06-07.jpg',
                experience: 21,
                qualification: 'Ph.D, ME(CE)'
            },
        ]
        for (i = 0; i < facultyList.length; i++) {
            document.write(
                `<div class="card d-inline-block me-5" style="width: 18rem;">
                <img src="${facultyList[i].image}" class="card-img-top" alt="...">
                <div class="card-body">
                <h5 class="card-title">${facultyList[i].name}</h5>
                <p class="card-text">${facultyList[i].qualification}</p>
                <p class="card-text">${facultyList[i].experience} + Years</p>
                <a href="#" class="btn btn-primary">See more details</a>
                </div>
                </div>`
            )
        }
    </script>
</body>

</html>
