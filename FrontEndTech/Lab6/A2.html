<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr=[4,7,31,5,1,32];
        arr.push(3)
        document.write("push method arr.push(3) : "+arr+"<br/>");
        arr.pop;
        document.write("pop method arr.pop() : "+arr+"<br/>");
        arr.shift()
        document.write("shift method arr.shift() : "+arr+"<br/>");
        arr.unshift(2)
        document.write("unshift method arr.unshift(2) : "+arr+"<br/>");
        arr.splice(2,1,6)
        document.write("splice method arr.splice(2,1,6) : "+arr+"<br/>");
        arr.sort();
        document.write("sort method arr.sort() : "+arr+"<br/>");
    </script>
</body>
</html>
