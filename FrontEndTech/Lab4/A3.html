<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter a number : "));
        for(i=n;i>=1;i--){
            for(j=1;j<=i;j++){
                document.write(i+" ")
            }
            document.write("<br/>")
        }
        document.write("<br/>")
        document.write("<br/>")
        document.write("<br/>")
        for(i=0;i<n;i++){
            for(j=0;j<=i;j++){
                if((i+j)%2==0) document.write(1+" ");
                else document.write(0+" ");
            }
            document.write("<br/>")
        }
        document.write("<br/>")
        document.write("<br/>")
        document.write("<br/>")
        for(i=0;i<n;i++){
            for(j=i;j<n;j++){
                document.write("&nbsp;");
            }
            for(j=0;j<=i;j++){
                document.write("*&nbsp;");
            }
            document.write("<br/>")
        }
    </script>
</body>
</html>
